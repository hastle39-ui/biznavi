<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BizNavi Q² 経営診断シート</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#c9956b;--navy:#1b2a4a;--bg:#faf9f7;--bg2:#f3f1ed;
  --border:rgba(0,0,0,0.1);--text:#1a1a1a;--text2:#666;
  --radius:12px;--radius-sm:8px;
}
body{font-family:'Georgia',serif;background:var(--bg);color:var(--text);min-height:100vh;padding:2rem 1rem}
.container{max-width:820px;margin:0 auto}
.header{text-align:center;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--gold)}
.header-badge{display:inline-block;font-size:10px;letter-spacing:4px;color:var(--gold);margin-bottom:.5rem;font-family:Arial,sans-serif}
.header h1{font-size:28px;font-weight:400;color:var(--navy);letter-spacing:2px}
.header h1 span{color:var(--gold)}
.header p{font-size:12px;color:var(--text2);margin-top:6px;letter-spacing:2px;font-family:Arial,sans-serif}
.mode-banner{text-align:center;padding:10px 16px;border-radius:var(--radius);margin-bottom:1.5rem;font-family:Arial,sans-serif;font-size:13px;font-weight:bold;letter-spacing:1px}
.mode-banner.client{background:#eaf3de;color:#3b6d11;border:1px solid #c5e0a0}
.mode-banner.consult{background:#fff3e0;color:#8b4000;border:1px solid #f0c080}
.section-title{font-size:11px;font-weight:bold;letter-spacing:3px;color:var(--gold);margin-bottom:1rem;font-family:Arial,sans-serif}
.scores-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;margin-bottom:1rem}
.score-card{background:white;border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem}
.score-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.score-num{width:24px;height:24px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;color:white;flex-shrink:0;font-family:Arial,sans-serif}
.score-label{font-size:13px;color:var(--navy);flex:1}
.score-hint{font-size:11px;color:var(--text2);margin-bottom:10px;font-family:Arial,sans-serif;line-height:1.5}
.score-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.score-type{font-size:11px;color:var(--text2);width:60px;flex-shrink:0;font-family:Arial,sans-serif}
.score-inputs{display:flex;gap:3px;flex-wrap:nowrap;align-items:center;max-width:100%}
.score-btn{width:calc((100% - 15px) / 6);max-width:34px;min-width:24px;height:30px;border:1px solid var(--border);border-radius:4px;background:white;font-size:12px;cursor:pointer;color:var(--text2);font-family:Arial,sans-serif;transition:all .15s;flex-shrink:1}
.score-btn:hover{border-color:var(--gold);color:var(--gold)}
.score-btn.active{background:var(--gold);border-color:var(--gold);color:white}
.score-legend{font-size:10px;color:var(--text2);font-family:Arial,sans-serif;display:flex;justify-content:space-between;margin-top:4px;padding:0 2px}
.diff-badge{font-size:11px;padding:2px 8px;border-radius:4px;font-family:Arial,sans-serif}
.diff-plus{background:#eaf3de;color:#3b6d11}
.diff-minus{background:#fcebeb;color:#a32d2d}
.diff-zero{background:#f3f1ed;color:#666}
.chart-wrap{display:flex;justify-content:center;background:white;border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:2rem}
hr{border:none;border-top:1px solid var(--border);margin:2rem 0}
.hearing-card{background:white;border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:12px}
.hearing-q{font-size:14px;color:var(--navy);margin-bottom:4px}
.hearing-hint{font-size:11px;color:var(--text2);margin-bottom:8px;font-family:Arial,sans-serif}
.hearing-area{width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;font-size:13px;font-family:Arial,sans-serif;color:var(--text);background:var(--bg);resize:vertical;min-height:56px;outline:none;transition:border-color .15s}
.hearing-area:focus{border-color:var(--gold)}
.mbti-link-box{background:#f0f5ff;border:1px solid #c0d0f0;border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:8px;font-family:Arial,sans-serif;font-size:13px;color:var(--navy)}
.mbti-link-box a{color:var(--gold);font-weight:bold}
.mbti-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.mbti-btn{padding:4px 12px;border:1px solid var(--border);border-radius:4px;background:white;font-size:11px;cursor:pointer;color:var(--text2);font-family:Arial,sans-serif;transition:all .15s}
.mbti-btn:hover{border-color:var(--gold);color:var(--gold)}
.mbti-btn.active{background:var(--gold);border-color:var(--gold);color:white}
.mbti-result{margin-top:12px;border:1px solid var(--gold);border-radius:var(--radius);overflow:hidden;display:none}
.mbti-result.show{display:block}
.mbti-result-header{background:var(--navy);color:white;padding:10px 16px;display:flex;align-items:center;gap:10px}
.mbti-type-badge{background:var(--gold);color:white;font-size:13px;font-weight:bold;padding:2px 10px;border-radius:4px;font-family:Arial,sans-serif}
.mbti-queen-title{font-size:14px;color:#e8c99a;letter-spacing:1px}
.mbti-result-body{padding:14px 16px;background:white}
.mbti-row-item{margin-bottom:12px}
.mbti-row-label{font-size:10px;letter-spacing:2px;color:var(--gold);margin-bottom:4px;font-family:Arial,sans-serif}
.mbti-row-value{font-size:13px;color:var(--text);line-height:1.6;font-family:Arial,sans-serif}
.mbti-trap{background:#fff5f0;border-left:3px solid #e07050;padding:8px 12px;border-radius:4px;font-size:13px;color:var(--text);font-family:Arial,sans-serif;line-height:1.6}
.mbti-strategy{background:#f0f5ff;border-left:3px solid var(--navy);padding:8px 12px;border-radius:4px;font-size:13px;color:var(--text);font-family:Arial,sans-serif;line-height:1.6}
.mbti-queen-type{margin-top:10px;padding:10px 14px;background:var(--bg2);border-radius:var(--radius-sm);font-size:12px;color:var(--text2);font-family:Arial,sans-serif}
.submit-btn{width:100%;padding:14px;background:var(--navy);color:white;border:none;border-radius:var(--radius);font-size:15px;font-family:Arial,sans-serif;cursor:pointer;letter-spacing:2px;margin-top:1.5rem;transition:opacity .15s}
.submit-btn:hover{opacity:.85}
.restore-banner{background:#fff3e0;border:1px solid var(--gold);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:1.5rem;font-family:Arial,sans-serif;font-size:13px;color:#8b4000;line-height:1.6}
.restore-banner strong{display:block;margin-bottom:6px;font-size:14px}
.analysis-card{background:white;border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem 1.5rem;margin-bottom:14px}
.analysis-card-title{font-size:11px;letter-spacing:3px;color:var(--gold);margin-bottom:12px;font-family:Arial,sans-serif}
.analysis-item{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;font-family:Arial,sans-serif;font-size:13px;line-height:1.6}
.analysis-badge{flex-shrink:0;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:bold;font-family:Arial,sans-serif}
.badge-strong{background:#eaf3de;color:#3b6d11}
.badge-weak{background:#fcebeb;color:#a32d2d}
.badge-gap-plus{background:#fff3e0;color:#b36000}
.badge-gap-minus{background:#f0f0ff;color:#3333aa}
.analysis-text{color:var(--text)}
.queen-match-wrap{background:var(--navy);border-radius:var(--radius);padding:1.25rem 1.5rem;margin-bottom:14px;color:white}
.queen-match-title{font-size:11px;letter-spacing:3px;color:#e8c99a;margin-bottom:12px;font-family:Arial,sans-serif}
.queen-match-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;font-family:Arial,sans-serif;font-size:13px;flex-wrap:wrap}
.queen-label{color:#e8c99a;font-size:11px;width:80px;flex-shrink:0}
.queen-value{color:white}
.queen-match-ok{color:#7ec87e;font-weight:bold}
.queen-match-ng{color:#ff9e7e;font-weight:bold}
.queen-advice{margin-top:12px;padding:10px 14px;background:rgba(255,255,255,0.08);border-radius:var(--radius-sm);font-size:13px;color:#e8e8e8;font-family:Arial,sans-serif;line-height:1.7}
.analysis-summary{background:linear-gradient(135deg,#1b2a4a 0%,#2a3d6a 100%);border-radius:var(--radius);padding:1.5rem;margin-bottom:14px;color:white;font-family:Arial,sans-serif}
.analysis-summary-title{font-size:11px;letter-spacing:3px;color:#e8c99a;margin-bottom:12px}
.analysis-summary-text{font-size:14px;line-height:1.8;color:#f0ece4}
.no-data-msg{text-align:center;color:var(--text2);font-size:13px;padding:2rem;font-family:Arial,sans-serif}
.summary-card{background:var(--bg2);border-radius:var(--radius);padding:1rem 1.25rem;margin-top:1.5rem}
.summary-label{font-size:11px;color:var(--text2);margin-bottom:8px;letter-spacing:2px;font-family:Arial,sans-serif}
.action-row{display:flex;gap:8px;margin-top:1.5rem;flex-wrap:wrap}
.action-btn{padding:10px 20px;border:1px solid var(--border);border-radius:var(--radius-sm);background:white;font-size:13px;cursor:pointer;color:var(--text);font-family:Arial,sans-serif;transition:all .15s}
.action-btn:hover{border-color:var(--gold);color:var(--gold)}
.action-btn.primary{background:var(--gold);border-color:var(--gold);color:white}
.footer{text-align:center;margin-top:3rem;padding-top:1.5rem;border-top:1px solid var(--gold);font-size:11px;color:var(--text2);letter-spacing:2px;font-family:Arial,sans-serif}
.footer span{color:var(--gold)}
.preview-panel{margin-top:1.5rem;border:2px solid var(--gold);border-radius:var(--radius);overflow:hidden;display:none}
.preview-panel.show{display:block}
.preview-header{background:linear-gradient(135deg,#1b2a4a,#2a3d6a);color:white;padding:14px 18px;text-align:center}
.preview-header h3{font-size:16px;font-weight:400;letter-spacing:2px;margin-bottom:4px}
.preview-header p{font-size:11px;color:#e8c99a;letter-spacing:1px;font-family:Arial,sans-serif}
.preview-body{padding:1.25rem 1.5rem;background:white}
.preview-queen{text-align:center;padding:1rem;background:var(--bg2);border-radius:var(--radius-sm);margin-bottom:1rem}
.preview-queen-title{font-size:11px;letter-spacing:2px;color:var(--gold);margin-bottom:6px;font-family:Arial,sans-serif}
.preview-queen-name{font-size:20px;color:var(--navy)}
.preview-strength{background:#eaf3de;border-left:3px solid #3b6d11;padding:10px 14px;border-radius:4px;margin-bottom:1rem;font-family:Arial,sans-serif;font-size:13px;color:#2a4a1a;line-height:1.6}
.preview-lock{background:var(--bg2);border:1px dashed var(--gold);border-radius:var(--radius-sm);padding:1.5rem;text-align:center;margin-bottom:1rem}
.preview-lock-icon{font-size:28px;margin-bottom:8px}
.preview-lock-text{font-size:13px;color:var(--text2);font-family:Arial,sans-serif;line-height:1.7;margin-bottom:14px}
.preview-lock-items{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:16px}
.preview-lock-item{background:white;border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--text2);font-family:Arial,sans-serif;opacity:.6}
.booking-btn{display:inline-block;background:var(--gold);color:white;padding:12px 28px;border-radius:var(--radius-sm);font-size:14px;font-family:Arial,sans-serif;text-decoration:none;letter-spacing:1px;transition:opacity .15s}
.booking-btn:hover{opacity:.85}
@media print{
  .no-print{display:none!important}
  body{padding:0}
  .container{max-width:100%}
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-badge">QUEEN · QUALITY · QUESTION · QUEST</div>
    <h1>BizNavi <span>Q²</span> 経営診断シート</h1>
    <p>現在地を知り、目指すべき場所へ</p>
  </div>

  <div class="mode-banner client" id="modeBanner">📋 事前課題モード — 各項目を正直に自己評価してください</div>
  <div id="restoreBanner" style="display:none"></div>

  <div class="section-title">01 — 9項目スコアリング</div>
  <div id="scaleNote" style="text-align:right;font-size:11px;color:var(--text2);font-family:Arial,sans-serif;margin-bottom:8px">1（最小）〜 6（最大）で評価してください</div>
  <div class="scores-grid" id="scoresGrid"></div>
  <div class="chart-wrap"><canvas id="radar" width="340" height="340"></canvas></div>

  <hr>

  <div class="section-title">02 — ヒアリングシート</div>
  <div id="hearingSheet"></div>
  <div id="mbtiResultPanel" class="mbti-result"></div>
  <div id="previewPanel" class="preview-panel no-print"></div>

  <!-- 事前課題モードのみ表示 -->
  <div id="submitSection">
    <div style="display:flex;gap:12px;margin-top:1.5rem;flex-wrap:wrap">
      <button class="submit-btn no-print" style="background:var(--navy);flex:1;min-width:200px" onclick="submitAndBook()">🗓 面談予約がまだの方はコチラ（予約＋課題提出）</button>
      <button id="submitBtn" class="submit-btn no-print" style="background:var(--gold);flex:1;min-width:200px" onclick="submitClientData()">✅ 事前課題を提出する（面談予約済みの方）</button>
    </div>
  </div>

  <hr id="analysisHr" style="display:none">

  <!-- 面談モードのみ表示 -->
  <div id="analysisSection" style="display:none">
    <div class="section-title">03 — 診断結果サマリー</div>
    <div id="analysisWrap"><div class="no-data-msg">客観評価を入力すると、分析結果が表示されます。</div></div>
  </div>

  <div id="memoSection" style="display:none">
    <div class="summary-card">
      <div class="summary-label">診断メモ（セッション中の気づき）</div>
      <textarea class="hearing-area" id="sessionMemo" style="min-height:80px" placeholder="スキャンで感じたこと、クライアントの本音、深掘りすべきポイントなど..."></textarea>
    </div>
  </div>

  <div class="action-row">
    <button class="action-btn primary no-print" id="btnPrint" style="display:none" onclick="window.print()">🖨 印刷 / PDF保存</button>
    <button class="action-btn no-print" id="btnReset" onclick="resetAll()">リセット</button>
  </div>

  <div class="footer"><span>BizNavi Q²</span> — すべての迷子に、地図を。</div>
</div>

<script>
var FORMSPREE_URL='https://formspree.io/f/xpqkknrk';

var items=[
  {num:1,label:"ビジョン・方向性",hint:"将来のビジョンが明確である。"},
  {num:2,label:"商品・サービス",hint:"商品やサービスに自信がある。"},
  {num:3,label:"集客・発信",hint:"誰に届けたいかが明確で、発信内容も統一感がある。"},
  {num:4,label:"セールス・成約",hint:"商品価格が適切で、安定的に成約できている。"},
  {num:5,label:"時間管理",hint:"優先順位をつけて、時間を有効に使えている。"},
  {num:6,label:"事業計画（売上・利益・お金）",hint:"予算を立てて、収入の流れと収支管理が出来ている。"},
  {num:7,label:"人・チーム",hint:"自分の代わりに動いてくれる右腕や仲間がいる。"},
  {num:8,label:"メンタル・エネルギー",hint:"日々の業務に向き合えるエネルギーがある。"},
  {num:9,label:"パワーパートナー",hint:"信頼できる仲間や相談相手がいる。孤独な経営者になっていない。"}
];

var hearingQs=[
  {q:"お名前",hint:"フルネームで入力してください",name:true},
  {q:"メールアドレス",hint:"面談の確認メールをお送りします",email:true},
  {q:"現在の事業について教えてください",hint:"業種、年数、売上規模、チーム構成など"},
  {q:"今一番の悩みや困りごとは何ですか？",hint:"具体的なエピソードがあれば"},
  {q:"半年後・1年後、どんな状態になっていたいですか？",hint:"売上・時間・気持ち、どんな角度でも"},
  {q:"今まで試したこと、うまくいかなかったことは？",hint:"過去の行動と結果"},
  {q:"MBTIタイプ",hint:"事前に診断しておいてください。分からない方は下のリンクから。",mbti:true}
];

var mbtiTypes=["INTJ","INTP","ENTJ","ENTP","INFJ","INFP","ENFJ","ENFP","ISTJ","ISFJ","ESTJ","ESFJ","ISTP","ISFP","ESTP","ESFP"];

var mbtiData={
  INTJ:{title:"孤高の戦略女王",role:"仕組みの構築・長期戦略",job:"経営コンサルタント、システムアーキテクト、投資家、戦略立案者",trap:"完璧な設計図ができるまで動けず、チャンスを逃す",strategy:"60点でリリースする仕組みを作る。予約販売で先に締切を設定。改善はリリース後のデータで行う。",queenType:"B：完璧主義の準備中"},
  INTP:{title:"真理の探求女王",role:"理論構築・問題分析",job:"プログラマー、研究者、データサイエンティスト、哲学者",trap:"分析に没頭しすぎて、肝心の商品リリースを忘れる",strategy:"分析結果を即コンテンツ化するルールを作る。外注やAIに出す作業を委託。",queenType:"B：完璧主義の準備中"},
  ENTJ:{title:"絶対王政の統治女王",role:"組織運営・拡大戦略",job:"経営者、エグゼクティブ、プロジェクトマネージャー、政治家",trap:"周囲に自分と同じ基準を求めすぎて、チームが逃げ出す",strategy:"業務を細分化しマニュアル化。右腕とAI活用で自分が動かない仕組みを作る。",queenType:"D：独走状態の労働集約"},
  ENTP:{title:"革新のアイディア女王",role:"企画立案・新規事業",job:"起業家、ベンチャーキャピタリスト、広告プランナー、発明家",trap:"新しい企画を試しすぎて、既存の事業が放置される",strategy:"発信媒体を1つに絞り導線を固定。新アイディアは既存商品の強化に使う。",queenType:"C：トレンド迷子の多動力"},
  INFJ:{title:"慈愛の預言女王",role:"ビジョン言語化・育成",job:"カウンセラー、心理療法士、作家、非営利組織のリーダー",trap:"理想が高すぎて、現実の泥臭い集客に絶望して病む",strategy:"個別対応を廃止しパッケージ化。動画講座やコミュニティ運営へシフト。",queenType:"A：献身的な召使い"},
  INFP:{title:"幻想の芸術女王",role:"独自の世界観作り",job:"クリエイティブディレクター、芸術家、詩人、社会活動家",trap:"批判を恐れて発信に引きこもり、誰にも見つからない",strategy:"女王のルールを明文化。個別対応を廃止しパッケージ化する。",queenType:"A：献身的な召使い"},
  ENFJ:{title:"太陽の導き女王",role:"コミュニティ運営・教育",job:"コーチ、広報担当者、教師、人事マネージャー",trap:"顧客の悩みを背負いすぎて、自分を後回しにする",strategy:"1対1の依存を断ち、優しさを商品設計に封印する。コミュニティ運営へシフト。",queenType:"A：献身的な召使い"},

// URLパラメーターを読み込む
function loadFromURL(){
  var params=new URLSearchParams(window.location.search);
  var s=params.get('s');
  var mbti=params.get('mbti');
  var name=params.get('name');
  var answers=params.get('a');
  if(!s) return false;
  var scores=s.split(',').map(Number);
  for(var i=0;i<9;i++) selfScores[i]=scores[i]||0;
  // 面談モードで起動
  currentMode='consult';
  return {mbti:mbti,name:decodeURIComponent(name||''),answers:answers?decodeURIComponent(answers).split('||'):[]};
}

function buildConsultURL(data){
  var base=window.location.href.split('?')[0];
  var s=data.selfScores.join(',');
  var mbti=encodeURIComponent(data.mbtiType||'');
  var name=encodeURIComponent(data.name||'');
  var answers=encodeURIComponent((data.hearingAnswers||[]).join('||'));
  return base+'?s='+s+'&mbti='+mbti+'&name='+name+'&a='+answers;
}

function renderScores(){
  var grid=document.getElementById('scoresGrid');
  var html='';
  for(var i=0;i<items.length;i++){
    var item=items[i];
    var self=selfScores[i];
    var obj=objScores[i];
    var diff=obj-self;
    var diffHtml='';
    if(self>0&&obj>0&&currentMode==='consult'){
      var cls=diff>0?'diff-plus':diff<0?'diff-minus':'diff-zero';
      var sign=diff>0?'+':'';
      diffHtml='<span class="diff-badge '+cls+'">'+sign+diff+'</span>';
    }
    var selfBtns='';
    for(var n=1;n<=6;n++){
      var disabled=currentMode==='consult'?' disabled style="opacity:.5;cursor:default;"':'';
      selfBtns+='<button class="score-btn'+(self===n?' active':'')+'"'+disabled+' onclick="'+(currentMode==='client'?'setScore(\'self\','+i+','+n+')':'')+'">'+n+'</button>';
    }
    var objBtns='';
    for(var n=1;n<=6;n++){
      objBtns+='<button class="score-btn'+(obj===n?' active':'')+'" onclick="setScore(\'obj\','+i+','+n+')">'+n+'</button>';
    }
    var objRow=currentMode==='consult'?'<div class="score-row"><span class="score-type">客観評価</span><div class="score-inputs">'+objBtns+'</div></div>':'';
    html+='<div class="score-card">';
    html+='<div class="score-header"><div class="score-num">'+item.num+'</div><div class="score-label">'+item.label+'</div>'+diffHtml+'</div>';
    html+='<div class="score-hint">'+item.hint+'</div>';
    html+='<div class="score-row"><span class="score-type">自己評価</span><div class="score-inputs">'+selfBtns+'</div></div>';
    html+='<div class="score-legend"><span>1＝最小</span><span>6＝最大</span></div>';
    html+=objRow;
    html+='</div>';
  }
  grid.innerHTML=html;
}

      extra='<textarea class="hearing-area"'+ro+' placeholder="記入欄...">'+val+'</textarea>';
    }
    html+='<div class="hearing-card">';
    html+='<div class="hearing-q">Q'+(i+1)+'. '+q.q+'</div>';
    html+='<div class="hearing-hint">'+q.hint+'</div>';

    html+='</div>';

function getScoreQueenType(){
  var filled=selfScores.filter(function(s){return s>0}).length;
  if(filled<5) return null;
  var avg=selfScores.reduce(function(a,b){return a+b},0)/9;
  var lowItems=[];
  for(var i=0;i<selfScores.length;i++){
    if(selfScores[i]>0&&selfScores[i]<=3) lowItems.push(i);
  }
  if(lowItems.indexOf(6)>=0||lowItems.indexOf(7)>=0){
    if(lowItems.indexOf(3)>=0||lowItems.indexOf(4)>=0) return "D：独走状態の労働集約";
  }
  if(lowItems.indexOf(3)>=0&&lowItems.indexOf(2)>=0) return "A：献身的な召使い";
  if(lowItems.indexOf(0)>=0&&lowItems.indexOf(2)>=0) return "B：完璧主義の準備中";
  if(lowItems.indexOf(0)>=0&&lowItems.indexOf(4)>=0) return "C：トレンド迷子の多動力";
  if(avg>=5) return "D：独走状態の労働集約";
  if(avg<=2) return "B：完璧主義の準備中";
  return null;
}

    wrap.innerHTML='<div class="no-data-msg">スコアを3項目以上入力すると分析結果が表示されます。</div>';
    return;
  }
  var scored=[];
  for(var i=0;i<items.length;i++){
    if(selfScores[i]>0) scored.push({i:i,label:items[i].label,self:selfScores[i],obj:objScores[i]});
  }
  scored.sort(function(a,b){return b.self-a.self});
  var strong=scored.filter(function(x){return x.self>=4}).slice(0,3);
  var weak=scored.filter(function(x){return x.self<=3}).slice(-3).reverse();
  var gaps=[];
  for(var i=0;i<items.length;i++){
    if(selfScores[i]>0&&objScores[i]>0&&Math.abs(objScores[i]-selfScores[i])>=2){
      gaps.push({i:i,label:items[i].label,self:selfScores[i],obj:objScores[i],diff:objScores[i]-selfScores[i]});
    }
  }
  gaps.sort(function(a,b){return Math.abs(b.diff)-Math.abs(a.diff)});
  var mbtiQueenType=getActiveQueenTypeFromMbti();
  var scoreQueenType=getScoreQueenType();
  var sumSelf=selfScores.reduce(function(a,b){return a+b},0);
  var avgSelf=(sumSelf/Math.max(filledSelf,1)).toFixed(1);
  var avgObj=filledObj>0?(objScores.reduce(function(a,b){return a+b},0)/Math.max(filledObj,1)).toFixed(1):null;
  var overallComment=parseFloat(avgSelf)>=5?'全体的に高い自己評価です。客観評価とのズレがある項目に注目してください。':parseFloat(avgSelf)>=3?'いくつかの項目に改善の余地があります。優先度の高い項目から手を打ちましょう。':'複数の項目で課題があります。まず一つに絞って集中的に改善することをお勧めします。';
  var html='<div class="analysis-summary"><div class="analysis-summary-title">OVERALL SCORE</div>';
  html+='<div class="analysis-summary-text">自己評価の平均スコアは <strong>'+avgSelf+'</strong> / 6 です。';
  if(avgObj) html+=' 客観評価の平均は <strong>'+avgObj+'</strong> / 6。';
  html+=' '+overallComment+'</div></div>';
  if(strong.length>0){
    html+='<div class="analysis-card"><div class="analysis-card-title">💪 強み（スコア上位）</div>';
    for(var i=0;i<strong.length;i++){
      var x=strong[i];
      html+='<div class="analysis-item"><span class="analysis-badge badge-strong">強み</span>';
      html+='<span class="analysis-text"><strong>'+x.label+'</strong>（自己'+x.self+(x.obj>0?' / 客観'+x.obj:'')+'）— '+strengthComments[x.i]+'</span></div>';
    }
    html+='</div>';
  }
  if(weak.length>0){
    html+='<div class="analysis-card"><div class="analysis-card-title">⚠️ 優先改善項目（スコア下位）</div>';
    for(var i=0;i<weak.length;i++){
      var x=weak[i];
      html+='<div class="analysis-item"><span class="analysis-badge badge-weak">要改善</span>';
      html+='<span class="analysis-text"><strong>'+x.label+'</strong>（自己'+x.self+(x.obj>0?' / 客観'+x.obj:'')+'）— '+weakComments[x.i]+'</span></div>';
    }
    html+='</div>';
  }
  if(gaps.length>0){
    html+='<div class="analysis-card"><div class="analysis-card-title">🔍 自己評価 vs 客観評価のズレ</div>';
    for(var i=0;i<gaps.length;i++){
      var x=gaps[i];
      var isPlus=x.diff>0;
      var comment=isPlus?'実際は自己評価より'+x.diff+'点高い。'+x.label+'を過小評価しています。自信を持って打ち出せる領域です。':'自己評価より'+Math.abs(x.diff)+'点低い。'+x.label+'に課題がある可能性があります。';
      html+='<div class="analysis-item"><span class="analysis-badge '+(isPlus?'badge-gap-plus':'badge-gap-minus')+'">'+(isPlus?'過小評価':'過大評価')+'</span>';
      html+='<span class="analysis-text"><strong>'+x.label+'</strong> — '+comment+'</span></div>';
    }
    html+='</div>';
  }
  if(mbtiQueenType||scoreQueenType){
    var match=mbtiQueenType&&scoreQueenType&&mbtiQueenType===scoreQueenType;
    var profile=queenTypeProfiles[mbtiQueenType||scoreQueenType]||{advice:''};
    html+='<div class="queen-match-wrap"><div class="queen-match-title">👑 女王タイプ照合</div>';
    if(mbtiQueenType) html+='<div class="queen-match-row"><span class="queen-label">MBTIから</span><span class="queen-value">'+mbtiQueenType+'</span></div>';
    if(scoreQueenType) html+='<div class="queen-match-row"><span class="queen-label">スコアから</span><span class="queen-value">'+scoreQueenType+'</span></div>';
    if(mbtiQueenType&&scoreQueenType){
      html+='<div class="queen-match-row"><span class="queen-label">照合結果</span><span class="'+(match?'queen-match-ok':'queen-match-ng')+'">'+(match?'✅ 一致 — タイプの傾向が現状に反映されています':'⚡ 不一致 — MBTIの本来の傾向と現状にズレがあります')+'</span></div>';
    }
    if(profile.advice) html+='<div class="queen-advice">'+profile.advice+'</div>';
    html+='</div>';
  }
  wrap.innerHTML=html;
}

function setConsultMode(restoredData){
  currentMode='consult';
  document.getElementById('modeBanner').className='mode-banner consult';
  document.getElementById('modeBanner').textContent='👑 面談モード — 客観評価を入力して診断結果を確認';
  document.getElementById('submitSection').style.display='none';
  document.getElementById('analysisSection').style.display='block';
  document.getElementById('analysisHr').style.display='block';
  document.getElementById('memoSection').style.display='block';
  document.getElementById('btnPrint').style.display='inline-block';
  document.getElementById('scaleNote').style.display='none';
  if(restoredData&&restoredData.name){
    var banner=document.getElementById('restoreBanner');
    banner.style.display='block';
    banner.innerHTML='<div class="restore-banner"><strong>📋 '+restoredData.name+' さんの事前課題データを読み込みました</strong>自己評価は変更できません。客観評価を入力して診断を進めてください。</div>';
  }
}

function resetAll(){
  selfScores=[0,0,0,0,0,0,0,0,0];
  objScores=[0,0,0,0,0,0,0,0,0];
  currentMode='client';
  document.getElementById('modeBanner').className='mode-banner client';
  document.getElementById('modeBanner').textContent='📋 事前課題モード — 各項目を正直に自己評価してください';
  document.getElementById('submitSection').style.display='block';
  document.getElementById('analysisSection').style.display='none';
  document.getElementById('analysisHr').style.display='none';
  document.getElementById('memoSection').style.display='none';
  document.getElementById('btnPrint').style.display='none';
  document.getElementById('restoreBanner').style.display='none';
  document.getElementById('scaleNote').style.display='block';
  var memo=document.getElementById('sessionMemo');
  if(memo) memo.value='';
  var panel=document.getElementById('mbtiResultPanel');
  if(panel){panel.className='mbti-result';panel.innerHTML='';}
  var preview=document.getElementById('previewPanel');
  if(preview){preview.className='preview-panel';preview.innerHTML='';}
  renderScores();
  renderHearing(null,null);
  updateChart();
  history.replaceState(null,'',window.location.pathname);
}

// 初期化
var restored=loadFromURL();
if(restored){
  renderScores();
  renderHearing(restored.answers,restored.mbti);
  updateChart();
  setConsultMode(restored);
  renderAnalysis();
} else {
  renderScores();
  renderHearing(null,null);
  updateChart();
}
</script>
